{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <h1>My Blog</h1>

    {% for post in posts %}
        <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
        <p>{{ post.body|truncatewords:5 }}</p>
        <small>{{ post.created_at }}</small>
        <hr>
    {% endfor %}

</body>
</html>
