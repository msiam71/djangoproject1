{% extends 'blog/base.html' %}


{% block content %}
    <h1>{{ post.title }}</h1>
    <p>{{ post.body }}</p>
    <small>{{ post.created_at }}</small>
    <br>
    <a href="{% url 'post_list' %}">Back to all posts</a>
    <br>
    <a href="{% url 'post_edit' pk=post.pk %}">Edit post</a>
    <br>
    <a href="{% url 'post_delete' pk=post.pk %}">Delete post</a>

 {% endblock %}
